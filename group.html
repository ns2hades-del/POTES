<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Groupes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 class="logo-title">POTES</h1>

    <div class="nav-bar">
        <button class="secondary" onclick="window.location.href='home.html'">Retour</button>
    </div>

    <div class="card">
        <h2>Créer un groupe</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input id="groupName" placeholder="Nom du groupe" style="margin: 0;">
            <button onclick="createGroup()" style="margin: 0; width: auto; padding: 14px 25px;">Créer</button>
        </div>
    </div>

    <div class="card">
        <h2>Groupes disponibles</h2>
        <div id="groups"></div>
    </div>
</div>

<script>
async function loadGroups() {
    const res = await fetch("/groups");
    const groups = await res.json();

    const container = document.getElementById("groups");
    container.innerHTML = "";

    groups.forEach(group => {
        const div = document.createElement("div");
        div.className = "user-card";
        div.innerHTML = `<strong>${group.name}</strong>`;

        div.onclick = () => {
            localStorage.setItem("activeGroup", group.name);
            window.location.href = "group-chat.html";
        };

        container.appendChild(div);
    });
}

async function createGroup() {
    const groupName = document
        .getElementById("groupName")
        .value
        .trim();

    if (!groupName) return;

    await fetch("/create-group", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ groupName })
    });

    document.getElementById("groupName").value = "";
    loadGroups();
}

loadGroups();
</script>

</body>
</html>
