<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Groupe - POTES</title>
    <link rel="icon" href="logo-dark.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="logo-title">POTES</h1>
</header>

<div class="container">
    <div class="card">
        <h2 id="group-title">Groupe</h2>

        <div id="messages"></div>

        <input type="text" id="messageInput" placeholder="Écris un message">
        <button onclick="sendGroupMessage()">Envoyer</button>

        <br><br>

        <a href="home.html">
            <button>Retour</button>
        </a>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const currentUser = localStorage.getItem("username");
const groupName = localStorage.getItem("groupName");

document.getElementById("group-title").innerText =
    "Groupe : " + groupName;

function sendGroupMessage() {
    const input = document.getElementById("messageInput");

    if (!input.value.trim()) return;

    const msg = {
        type: "group",
        group: groupName,
        from: currentUser,
        text: input.value
    };

    socket.emit("chat message", msg);
    input.value = "";
}

socket.on("load messages", messages => {
    document.getElementById("messages").innerHTML = "";

    messages.forEach(msg => {
        if (
            msg.type === "group" &&
            msg.group === groupName
        ) {
            displayMessage(msg);
        }
    });
});

socket.on("chat message", msg => {
    if (
        msg.type === "group" &&
        msg.group === groupName
    ) {
        displayMessage(msg);
    }
});

function displayMessage(msg) {
    const div = document.createElement("div");

    div.className =
        msg.from === currentUser
            ? "message-self"
            : "message-other";

    div.innerHTML =
        `<div class="message-bubble">
            <strong>${msg.from}</strong><br>
            ${msg.text}
        </div>`;

    document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
