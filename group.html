<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Groupes</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">
    <h1 class="logo-title">POTES</h1>

    <div class="card">
        <h2>Créer ou rejoindre un groupe</h2>

        <input id="groupName" placeholder="Nom du groupe">
        <button onclick="createGroup()">Créer / Rejoindre</button>
    </div>

    <div class="card">
        <h2 id="currentGroup"></h2>
        <div id="messages"></div>

        <input id="messageInput" placeholder="Message groupe">
        <button onclick="sendGroupMessage()">Envoyer</button>
    </div>
</div>

<script>
const socket = io();
let activeGroup = "";

async function createGroup() {
    const groupName = document.getElementById("groupName").value.trim();
    if (!groupName) return;

    await fetch("/create-group", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ groupName })
    });

    activeGroup = groupName;
    document.getElementById("currentGroup").innerText =
        "Groupe : " + groupName;
}

socket.on("chat message", msg => {
    if (msg.group !== activeGroup) return;

    const div = document.createElement("div");
    div.className = "message";
    div.innerHTML = "<strong>" + msg.from + ":</strong> " + msg.text;
    document.getElementById("messages").appendChild(div);
});

function sendGroupMessage() {
    const text = document.getElementById("messageInput").value.trim();
    if (!text || !activeGroup) return;

    socket.emit("chat message", {
        from: localStorage.getItem("username"),
        group: activeGroup,
        text
    });

    document.getElementById("messageInput").value = "";
}
</script>

</body>
</html>
