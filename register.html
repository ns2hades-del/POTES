<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - POTES</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 class="logo-title">POTES</h1>

    <div class="card">
        <h2>Créer un compte</h2>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">Rejoignez la communauté POTES dès aujourd'hui.</p>

        <form id="registerForm">
            <input type="text" id="username" placeholder="Choisissez un pseudo" required>
            <input type="password" id="password" placeholder="Mot de passe sécurisé" required>

            <button type="submit">S'inscrire</button>
        </form>

        <button class="secondary" onclick="window.location.href='login.html'" style="margin-top: 20px;">
            Déjà inscrit ? Se connecter
        </button>
    </div>
</div>

    <script src="script.js"></script>
    <script>
        document.getElementById("registerForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            await register();
        });
    </script>

</body>
</html>
