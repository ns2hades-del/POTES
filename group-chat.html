<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat Groupe</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="container">
    <h1 class="logo-title">POTES</h1>

    <div class="nav-bar">
        <button class="secondary" onclick="window.location.href='group.html'">Retour</button>
    </div>

    <div class="card">
        <h2 id="groupTitle" style="font-size: 1.2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;"></h2>

        <div id="messages"></div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <input id="messageInput" placeholder="Écrivez un message au groupe..." style="margin: 0;">
            <button onclick="sendMessage()" style="margin: 0; width: auto; padding: 14px 25px;">Envoyer</button>
        </div>
    </div>
</div>

<script>
const socket = io();

const group = localStorage.getItem("activeGroup");
const username = localStorage.getItem("username");
let secretKey = "";

// Notifications
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

// Chiffrement
fetch("/config")
.then(res => res.json())
.then(data => {
    secretKey = data.secret;
    loadHistory();
});

document.getElementById("groupTitle").innerText =
    "Groupe : " + group;

function loadHistory() {
    fetch("/group-messages/" + group)
    .then(res => res.json())
    .then(messages => {
        messages.forEach(msg => {
            addMessage({
                from: msg.from_user,
                text: decrypt(msg.text),
                created_at: msg.created_at
            });
        });
        scrollToBottom();
    });
}

socket.on("chat message", msg => {
    if (msg.group !== group) {
        if (document.hidden && msg.from !== username) {
             // On pourrait filtrer si l'user est dans le groupe, mais ici on simplifie
        }
        return;
    }
    
    const decryptedText = decrypt(msg.text);
    addMessage({ ...msg, text: decryptedText });
    scrollToBottom();

    if (document.hidden && msg.from !== username) {
        showNotification(msg.from, decryptedText, `Groupe: ${group}`);
    }
});

function encrypt(text) {
    if (!text || !secretKey) return text;
    return CryptoJS.AES.encrypt(text, secretKey).toString();
}

function decrypt(ciphertext) {
    if (!ciphertext || !secretKey) return ciphertext;
    try {
        const bytes = CryptoJS.AES.decrypt(ciphertext, secretKey);
        return bytes.toString(CryptoJS.enc.Utf8) || ciphertext;
    } catch (e) {
        return ciphertext;
    }
}

function showNotification(from, text, title) {
    if (Notification.permission === "granted") {
        new Notification(title || `Message de ${from}`, {
            body: text,
            icon: "logo-dark.png"
        });
    }
}

function addMessage(msg) {
    const div = document.createElement("div");
    const isSent = msg.from === username;
    
    const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    div.className = `message ${isSent ? 'message-sent' : 'message-received'}`;
    
    div.innerHTML = `
        <div class="message-info">${isSent ? 'Moi' : msg.from} • ${time} <span style="font-size: 10px; opacity: 0.5;">🔒</span></div>
        <div class="message-text">${msg.text}</div>
    `;

    document.getElementById("messages").appendChild(div);
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text) return;

    socket.emit("chat message", {
        from: username,
        group: group,
        text: encrypt(text)
    });

    input.value = "";
    input.focus();
}

function scrollToBottom() {
    const container = document.getElementById("messages");
    container.scrollTop = container.scrollHeight;
}

document.getElementById("messageInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
