<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat Groupe</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">
    <h1 class="logo-title">POTES</h1>

    <div class="nav-bar">
        <button class="secondary" onclick="window.location.href='group.html'">Retour</button>
    </div>

    <div class="card">
        <h2 id="groupTitle" style="font-size: 1.2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;"></h2>

        <div id="messages"></div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <input id="messageInput" placeholder="Écrivez un message au groupe..." style="margin: 0;">
            <button onclick="sendMessage()" style="margin: 0; width: auto; padding: 14px 25px;">Envoyer</button>
        </div>
    </div>
</div>

<script>
const socket = io();

const group = localStorage.getItem("activeGroup");
const username = localStorage.getItem("username");

document.getElementById("groupTitle").innerText =
    "Groupe : " + group;

fetch("/group-messages/" + group)
.then(res => res.json())
.then(messages => {
    messages.forEach(msg => {
        addMessage({
            from: msg.from_user,
            text: msg.text
        });
    });
    scrollToBottom();
});

socket.on("chat message", msg => {
    if (msg.group !== group) return;
    addMessage(msg);
    scrollToBottom();
});

function addMessage(msg) {
    const div = document.createElement("div");
    const isSent = msg.from === username;
    
    div.className = `message ${isSent ? 'message-sent' : 'message-received'}`;
    
    div.innerHTML = `
        <div class="message-info">${isSent ? 'Moi' : msg.from}</div>
        <div class="message-text">${msg.text}</div>
    `;

    document.getElementById("messages").appendChild(div);
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text) return;

    socket.emit("chat message", {
        from: username,
        group: group,
        text: text
    });

    input.value = "";
    input.focus();
}

function scrollToBottom() {
    const container = document.getElementById("messages");
    container.scrollTop = container.scrollHeight;
}

document.getElementById("messageInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
