<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>POTES - Accueil</title>
    <link rel="icon" href="logo-dark.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="logo-title">POTES</h1>

    <div class="nav-bar">
        <button onclick="window.location.href='profile.html'">Mon Profil</button>
        <button onclick="window.location.href='group.html'">Groupes</button>
        <button class="secondary" onclick="logout()">Quitter</button>
    </div>

    <div class="card">
        <h2>Utilisateurs en ligne</h2>
        <div id="users"></div>
    </div>

</div>

<script>
const currentUser = localStorage.getItem("username");

if (!currentUser) {
    window.location.href = "index.html";
}

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

fetch("/users")
.then(res => res.json())
.then(users => {
    const usersContainer = document.getElementById("users");
    usersContainer.innerHTML = "";

    users.forEach(user => {
        if (user.username === currentUser) return;

        const div = document.createElement("div");
        div.className = "user-card";

        div.innerHTML = `
            <img
                src="${user.avatar || 'logo-dark.png'}"
                class="avatar"
            >
            <div>
                <div style="font-weight: 600; font-size: 16px;">${user.username}</div>
                <div style="font-size: 13px; color: var(--text-secondary);">Cliquez pour discuter</div>
            </div>
        `;

        div.onclick = () => {
            localStorage.setItem("chatUser", user.username);
            window.location.href = "chat.html";
        };

        usersContainer.appendChild(div);
    });
});
</script>

</body>
</html>
