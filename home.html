<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>POTES - Accueil</title>
    <link rel="icon" href="logo-dark.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="logo-title">POTES</h1>

    <div class="card">
        <h2>Navigation</h2>

        <button onclick="window.location.href='profile.html'">
            Mon profil
        </button>

        <button onclick="window.location.href='group.html'">
            Groupes
        </button>

        <button onclick="logout()">
            Déconnexion
        </button>
    </div>

    <div class="card">
        <h2>Utilisateurs disponibles</h2>
        <div id="users"></div>
    </div>

</div>

<script>
const currentUser = localStorage.getItem("username");

if (!currentUser) {
    window.location.href = "index.html";
}

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}

fetch("/users")
.then(res => res.json())
.then(users => {
    const usersContainer = document.getElementById("users");
    usersContainer.innerHTML = "";

    users.forEach(user => {
        if (user.username === currentUser) return;

        const div = document.createElement("div");
        div.className = "user-card";

        div.innerHTML = `
            <div style="display:flex;align-items:center;gap:12px;">
                <img
                    src="${user.avatar || 'logo-dark.png'}"
                    class="avatar"
                >
                <div>
                    <strong>${user.username}</strong>
                </div>
            </div>
        `;

        div.onclick = () => {
            localStorage.setItem("chatUser", user.username);
            window.location.href = "chat.html";
        };

        usersContainer.appendChild(div);
    });
});
</script>

</body>
</html>
