<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat privé</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">
    <h1 class="logo-title">POTES</h1>

    <div class="card">
        <h2 id="chatTitle"></h2>

        <div id="messages"></div>

        <input id="messageInput" placeholder="Écrire un message">
        <button onclick="sendMessage()">Envoyer</button>
    </div>
</div>

<script>
const socket = io();

const username = localStorage.getItem("username");
const chatUser = localStorage.getItem("chatUser");

document.getElementById("chatTitle").innerText =
    "Discussion avec " + chatUser;

socket.emit("user connected", username);

socket.on("chat message", msg => {
    const currentUser = localStorage.getItem("username");
    const activeUser = localStorage.getItem("chatUser");

    const isRelevant =
        (msg.from === currentUser && msg.to === activeUser) ||
        (msg.from === activeUser && msg.to === currentUser);

    if (!isRelevant) return;

    const div = document.createElement("div");
    div.className = "message";
    div.innerHTML = "<strong>" + msg.from + ":</strong> " + msg.text;

    document.getElementById("messages").appendChild(div);
});

function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text) return;

    socket.emit("chat message", {
        from: username,
        to: chatUser,
        text
    });

    input.value = "";
}
</script>

</body>
</html>
