<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat privé</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">
    <h1 class="logo-title">POTES</h1>

    <div class="nav-bar">
        <button class="secondary" onclick="window.location.href='home.html'">Retour</button>
    </div>

    <div class="card">
        <h2 id="chatTitle" style="font-size: 1.2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;"></h2>

        <div id="messages"></div>
        <div id="typingIndicator" style="font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; height: 18px;"></div>

        <div style="display: flex; gap: 10px; align-items: center;">
            <input id="messageInput" placeholder="Écrivez un message..." style="margin: 0;">
            <button onclick="sendMessage()" style="margin: 0; width: auto; padding: 14px 25px;">Envoyer</button>
        </div>
    </div>
</div>

<script>
const socket = io();

const username = localStorage.getItem("username");
const chatUser = localStorage.getItem("chatUser");

document.getElementById("chatTitle").innerText =
    "Discussion avec " + chatUser;

fetch(`/messages/${username}/${chatUser}`)
.then(res => res.json())
.then(messages => {
    messages.forEach(msg => {
        addMessage({
            from: msg.from_user,
            text: msg.text
        });
    });
    scrollToBottom();
});

socket.on("chat message", msg => {
    const valid =
        (msg.from === username && msg.to === chatUser) ||
        (msg.from === chatUser && msg.to === username);

    if (!valid) return;

    addMessage(msg);
    scrollToBottom();
});

function addMessage(msg) {
    const div = document.createElement("div");
    const isSent = msg.from === username;
    
    div.className = `message ${isSent ? 'message-sent' : 'message-received'}`;
    
    div.innerHTML = `
        <div class="message-info">${isSent ? 'Moi' : msg.from}</div>
        <div class="message-text">${msg.text}</div>
    `;

    document.getElementById("messages").appendChild(div);
}

let typingTimeout;
const input = document.getElementById("messageInput");

input.addEventListener("input", () => {
    socket.emit("typing", { from: username, to: chatUser });
    
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
        socket.emit("stop typing", { from: username, to: chatUser });
    }, 2000);
});

socket.on("typing", (data) => {
    if (data.from === chatUser && data.to === username) {
        document.getElementById("typingIndicator").innerText = `${chatUser} est en train d'écrire...`;
    }
});

socket.on("stop typing", (data) => {
    if (data.from === chatUser && data.to === username) {
        document.getElementById("typingIndicator").innerText = "";
    }
});

function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text) return;

    socket.emit("chat message", {
        from: username,
        to: chatUser,
        text: text
    });

    input.value = "";
    input.focus();
}

function scrollToBottom() {
    const container = document.getElementById("messages");
    container.scrollTop = container.scrollHeight;
}

document.getElementById("messageInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
