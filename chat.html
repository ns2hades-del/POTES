<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chat privé</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">
    <h1 class="logo-title">POTES</h1>

    <div class="nav-bar">
        <button class="secondary" onclick="window.location.href='home.html'">Retour</button>
    </div>

    <div class="card">
        <h2 id="chatTitle" style="font-size: 1.2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;"></h2>

        <div id="messages"></div>
        <div id="typingIndicator" style="font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; height: 18px;"></div>

        <div id="emojiPicker" style="display: none; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 12px; padding: 10px; margin-bottom: 10px; backdrop-filter: blur(12px); grid-template-columns: repeat(8, 1fr); gap: 5px;">
            <span onclick="addEmoji('😀')" style="cursor: pointer; font-size: 20px;">😀</span>
            <span onclick="addEmoji('😂')" style="cursor: pointer; font-size: 20px;">😂</span>
            <span onclick="addEmoji('😍')" style="cursor: pointer; font-size: 20px;">😍</span>
            <span onclick="addEmoji('😎')" style="cursor: pointer; font-size: 20px;">😎</span>
            <span onclick="addEmoji('👍')" style="cursor: pointer; font-size: 20px;">👍</span>
            <span onclick="addEmoji('🔥')" style="cursor: pointer; font-size: 20px;">🔥</span>
            <span onclick="addEmoji('✨')" style="cursor: pointer; font-size: 20px;">✨</span>
            <span onclick="addEmoji('🚀')" style="cursor: pointer; font-size: 20px;">🚀</span>
            <span onclick="addEmoji('😢')" style="cursor: pointer; font-size: 20px;">😢</span>
            <span onclick="addEmoji('😡')" style="cursor: pointer; font-size: 20px;">😡</span>
            <span onclick="addEmoji('🙏')" style="cursor: pointer; font-size: 20px;">🙏</span>
            <span onclick="addEmoji('🎉')" style="cursor: pointer; font-size: 20px;">🎉</span>
            <span onclick="addEmoji('❤️')" style="cursor: pointer; font-size: 20px;">❤️</span>
            <span onclick="addEmoji('😂')" style="cursor: pointer; font-size: 20px;">😂</span>
            <span onclick="addEmoji('🤔')" style="cursor: pointer; font-size: 20px;">🤔</span>
            <span onclick="addEmoji('👋')" style="cursor: pointer; font-size: 20px;">👋</span>
        </div>

        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 10px;">
            <button onclick="toggleEmojiPicker()" style="margin: 0; width: auto; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">😊</button>
            
            <label for="imageInput" style="margin: 0; width: auto; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                📷
            </label>
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="sendImage()">

            <button id="audioBtn" onclick="toggleRecording()" style="margin: 0; width: auto; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);">🎙️</button>

            <input id="messageInput" placeholder="Écrivez un message..." style="margin: 0;">
            <button onclick="sendMessage()" style="margin: 0; width: auto; padding: 14px 25px;">Envoyer</button>
        </div>
    </div>
</div>

<script>
const socket = io();

const username = localStorage.getItem("username");
const chatUser = localStorage.getItem("chatUser");

document.getElementById("chatTitle").innerText =
    "Discussion avec " + chatUser;

fetch(`/messages/${username}/${chatUser}`)
.then(res => res.json())
.then(messages => {
    messages.forEach(msg => {
        addMessage({
            from: msg.from_user,
            text: msg.text,
            image: msg.image_url,
            audio: msg.audio_url,
            created_at: msg.created_at
        });
    });
    scrollToBottom();
});

socket.on("chat message", msg => {
    const valid =
        (msg.from === username && msg.to === chatUser) ||
        (msg.from === chatUser && msg.to === username);

    if (!valid) return;

    addMessage(msg);
    scrollToBottom();
});

function addMessage(msg) {
    const div = document.createElement("div");
    const isSent = msg.from === username;
    
    const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    div.className = `message ${isSent ? 'message-sent' : 'message-received'}`;
    
    let content = `<div class="message-info">${isSent ? 'Moi' : msg.from} • ${time}</div>`;
    
    if (msg.image) {
        content += `<img src="${msg.image}" style="max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; cursor: pointer;" onclick="window.open('${msg.image}')">`;
    }

    if (msg.audio) {
        content += `<audio src="${msg.audio}" controls style="max-width: 100%; margin-top: 5px; display: block;"></audio>`;
    }
    
    if (msg.text) {
        content += `<div class="message-text">${msg.text}</div>`;
    }
    
    div.innerHTML = content;

    document.getElementById("messages").appendChild(div);
}

/* AUDIO RECORDING */
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

async function toggleRecording() {
    const btn = document.getElementById("audioBtn");
    
    if (!isRecording) {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append("audio", audioBlob);

            const res = await fetch("/upload-chat-audio", {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            if (data.success) {
                socket.emit("chat message", {
                    from: username,
                    to: chatUser,
                    audio: data.url,
                    text: ""
                });
            }
        };

        mediaRecorder.start();
        isRecording = true;
        btn.innerText = "🛑";
        btn.style.background = "rgba(255, 0, 0, 0.2)";
    } else {
        mediaRecorder.stop();
        isRecording = false;
        btn.innerText = "🎙️";
        btn.style.background = "rgba(255, 255, 255, 0.05)";
    }
}

async function sendImage() {
    const fileInput = document.getElementById("imageInput");
    const file = fileInput.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append("image", file);

    try {
        const res = await fetch("/upload-chat-image", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        if (data.success) {
            socket.emit("chat message", {
                from: username,
                to: chatUser,
                image: data.url,
                text: ""
            });
        }
    } catch (err) {
        console.error(err);
        alert("Erreur lors de l'envoi de l'image");
    }
    
    fileInput.value = "";
}

let typingTimeout;
const input = document.getElementById("messageInput");

input.addEventListener("input", () => {
    socket.emit("typing", { from: username, to: chatUser });
    
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
        socket.emit("stop typing", { from: username, to: chatUser });
    }, 2000);
});

socket.on("typing", (data) => {
    if (data.from === chatUser && data.to === username) {
        document.getElementById("typingIndicator").innerText = `${chatUser} est en train d'écrire...`;
    }
});

socket.on("stop typing", (data) => {
    if (data.from === chatUser && data.to === username) {
        document.getElementById("typingIndicator").innerText = "";
    }
});

function toggleEmojiPicker() {
    const picker = document.getElementById("emojiPicker");
    picker.style.display = picker.style.display === "none" ? "grid" : "none";
}

function addEmoji(emoji) {
    const input = document.getElementById("messageInput");
    input.value += emoji;
    input.focus();
    toggleEmojiPicker();
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text) return;

    socket.emit("chat message", {
        from: username,
        to: chatUser,
        text: text
    });

    input.value = "";
    input.focus();
}

function scrollToBottom() {
    const container = document.getElementById("messages");
    container.scrollTop = container.scrollHeight;
}

document.getElementById("messageInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
