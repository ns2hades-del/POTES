<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POTES V2</title>
    <link rel="icon" href="logo-dark.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 class="logo-title">POTES</h1>

    <div class="card">
        <h2>Bienvenue</h2>
        <p style="color: var(--text-secondary); margin-bottom: 20px;">Connectez-vous pour discuter avec vos amis.</p>

        <input
            type="text"
            id="username"
            placeholder="Nom d'utilisateur"
        >

        <input
            type="password"
            id="password"
            placeholder="Mot de passe"
        >

        <button onclick="login()">
            Se connecter
        </button>

        <button class="secondary" onclick="window.location.href='register.html'">
            Créer un compte
        </button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
